version: '3.8'

services:
  solara:
    image: ghcr.io/akudamatata/solara:latest
    container_name: solara
    restart: always
    ports:
      - "8787:8787"
    environment:
      # 登录密码（不设置则无密码保护）
      - PASSWORD=your_secure_password_here
    volumes:
      # 持久化 SQLite 数据库（收藏夹和播放记录）
      - ./data:/app/data
